<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxeVoyage · Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">

  <!-- =============== SIDEBAR =============== -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="30" height="30">
          <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="1.4"/>
          <path d="M20 6 L23 18 L35 20 L23 22 L20 34 L17 22 L5 20 L17 18 Z" fill="currentColor"/>
        </svg>
      </span>
      <div class="brand-text">
        <strong>LuxeVoyage</strong>
        <small>painel operacional</small>
      </div>
    </div>

    <nav class="nav" id="nav">
      <div class="nav-section-label">Início</div>
      <a href="#/dashboard" class="nav-link" data-route="dashboard">
        <span class="nav-ico">◆</span> Dashboard
      </a>

      <div class="nav-section-label">Domínios</div>
      <div id="nav-dominios"><!-- montado via JS a partir de /api/registro --></div>

      <div class="nav-section-label">Ferramentas</div>
      <a href="#/sql" class="nav-link" data-route="sql">
        <span class="nav-ico">⌁</span> Consulta SQL
      </a>
    </nav>

    <div class="sidebar-footer">
      <span id="conn-dot" class="conn-dot"></span>
      <span id="conn-label">verificando conexão…</span>
    </div>
  </aside>

  <!-- =============== TOPBAR (mobile) =============== -->
  <button class="mobile-toggle" id="mobile-toggle" aria-label="Abrir menu">☰</button>

  <!-- =============== CONTEÚDO =============== -->
  <main class="content" id="content">
    <!-- injetado via JS -->
  </main>
</div>

<!-- =============== MODAL (criar/editar registro) =============== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <header class="modal-header">
      <h3 id="modal-title">Novo registro</h3>
      <button class="modal-close" id="modal-close" aria-label="Fechar">✕</button>
    </header>
    <form id="modal-form" class="modal-form"></form>
  </div>
</div>

<!-- =============== TOASTS =============== -->
<div class="toast-stack" id="toast-stack"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
